###############################################################################
# SNPseek BrAPI v2.1 — Docker Compose (Host Networking)
#
# Managed services   : snp-api (Spring Boot)   snp-ui (React / nginx)
# External services  : PostgreSQL (localhost:5432) Keycloak (remote)
#
# Host networking mode: Both containers share the host's network stack.
# - Containers reach each other via "localhost"
# - Host services (Postgres) reached via "localhost"
# - Both services bind directly to host ports (8081 and 3000)
#
# Required secrets — copy .env.example to .env and fill in values before
# running `docker compose up`:
#
#   cp .env.example .env
###############################################################################

services:

  # ---------------------------------------------------------------------------
  # snp-api — Spring Boot BrAPI v2.1 resource server
  # ---------------------------------------------------------------------------
  snp-api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-irri-snpseek}/snpseek-brapi-api-server:latest
    build:
      context: ../../apps/api-server
      dockerfile: Dockerfile
    container_name: snp-api
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      # Use port 8081 as the standard for both local and containerised deployments.
      SERVER_PORT: "8081"

      # Local PostgreSQL — In host network mode, "localhost" refers to the host.
      SPRING_DATASOURCE_URL: "jdbc:postgresql://${DB_HOST:-localhost}:${DB_PORT:-5432}/${DB_NAME:-snpseek}"
      DB_HOST: "${DB_HOST:-localhost}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"

      # Keycloak — external HTTPS service; reached via public DNS/IP.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "https://brs-snpseek.duckdns.org/auth/realms/snpseek_realm"

      # HDF5 base directory — prepended to genotype_run.data_location values.
      HDF5_DATA_DIR: "/data"

      # JVM tuning for a container environment.
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

      # Explicit dialect so Hibernate can start even if the initial connection
      # probe fails (avoids "Unable to determine Dialect" crash on retry).
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
    volumes:
      # Host HDF5 data directory → /data inside the container (read-only).
      # genotype_run.data_location filenames are resolved relative to /data.
      - /home/lhbarboza/data:/data:ro
    healthcheck:
      # /brapi/v2/serverinfo is a public BrAPI endpoint — no auth required.
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/brapi/v2/serverinfo || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # snp-ui — Vite/React dashboard served by nginx
  # ---------------------------------------------------------------------------
  snp-ui:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-irri-snpseek}/snpseek-web-portal:latest
    build:
      context: ../../apps/web-portal
      dockerfile: Dockerfile
    container_name: snp-ui
    restart: unless-stopped
    network_mode: host
    depends_on:
      snp-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
