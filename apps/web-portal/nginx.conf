server {
    listen 3000;

    root  /usr/share/nginx/html;
    index index.html;

    # ── BrAPI proxy ───────────────────────────────────────────────────────────
    # Mirrors the Vite dev-server proxy (vite.config.js → server.proxy).
    # In the Docker network "snp-api" resolves to the Spring Boot container.
    location /brapi/ {
        proxy_pass         http://snp-api:8081/brapi/;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Genotype streaming responses can be large; extend timeouts.
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;

        # Disable buffering so streaming responses reach the browser promptly.
        proxy_buffering off;
    }

    # ── React SPA fallback ────────────────────────────────────────────────────
    # For any route not matched above, serve index.html so React Router can
    # handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
