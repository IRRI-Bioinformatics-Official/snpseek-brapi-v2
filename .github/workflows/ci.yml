name: CI - Build and Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ---------------------------------------------------------------------------
  # API Server (Spring Boot)
  # ---------------------------------------------------------------------------
  api-server:
    name: API Server
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        run: mvn -B clean test
        working-directory: apps/api-server

  # ---------------------------------------------------------------------------
  # Web Portal (React/Vite)
  # ---------------------------------------------------------------------------
  web-portal:
    name: Web Portal
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web-portal/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: apps/web-portal

      - name: Build Production Bundle
        run: npm run build
        working-directory: apps/web-portal

  # ---------------------------------------------------------------------------
  # Docker Image Validation
  # ---------------------------------------------------------------------------
  docker-validation:
    name: Docker Validation
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Build API Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: apps/api-server
          push: false
          tags: snpseek/brapi-api-server:test

      - name: Build UI Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: apps/web-portal
          push: false
          tags: snpseek/web-portal:test
