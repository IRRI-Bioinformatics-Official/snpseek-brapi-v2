name: CD - Build, Push and Deploy

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Build and Push Docker Images
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build and Push Images
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: apps/api-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/snpseek-brapi-api-server:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/snpseek-brapi-api-server:${{ github.sha }}

      - name: Build and Push UI Image
        uses: docker/build-push-action@v5
        with:
          context: apps/web-portal
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/snpseek-web-portal:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/snpseek-web-portal:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Deploy to Remote Server
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd projects/snpseek-brapi-v2/infrastructure/docker
            # Export the lowercase owner so docker-compose picks it up
            export GITHUB_REPOSITORY_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            docker compose pull
            docker compose up -d
            docker image prune -af
